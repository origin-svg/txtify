<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Txtify</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: white;
      color: black;
      margin: 30px;
      padding: 0;
      line-height: 1.5;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      text-align: center;
    }
    label {
      font-size: 16px;
      display: block;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #555;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 450px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #555;
      font-family: Arial, Helvetica, sans-serif;
      resize: vertical;
    }
    button {
      background-color: black;
      color: white;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background-color: #333;
    }
    .info {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Txtify</h1>

  <label>Nombre del archivo:</label>
  <input type="text" id="filename" value="documento.txt">

  <label>Texto a guardar:</label>
  <textarea id="content" placeholder="Escribe aquí el texto que quieres guardar..."></textarea>

  <button onclick="descargarTXT()">Descargar como .txt</button>

  <div class="info">
    Escribe el texto y presiona el botón para descargar el archivo .txt
  </div>

  <script>
    function descargarTXT() {
      const filename = document.getElementById("filename").value.trim();
      const content = document.getElementById("content").value;

      if (!filename) {
        alert("Por favor escribe un nombre para el archivo");
        return;
      }

      const blob = new Blob([content], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename.endsWith(".txt") ? filename : filename + ".txt";
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
